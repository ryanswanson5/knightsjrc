<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamesheet Direct Native Overlay</title>
<style>
  /* ── LAYOUT CONFIG ─────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Arial Narrow', Arial, sans-serif;
  }

  /* ── SCOREBOARD PANEL ──────────────────────────────────────────────── */
  #numeric-scoreboard {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #numeric-scoreboard.visible { opacity: 1; }

  .score-row {
    display: flex;
    align-items: center;
    background: #111111;
    height: 72px;
    border-radius: 4px;
    overflow: hidden;
  }

  .score-box {
    background: #e8c84a;
    height: 72px;
    width: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
    font-weight: 900;
    color: #111111;
  }

  .score-divider {
    color: #ffffff;
    font-size: 24px;
    font-weight: 700;
    padding: 0 20px;
    letter-spacing: 0.05em;
  }

  .shots-strip {
    display: flex;
    align-items: center;
    background: rgba(17, 17, 17, 0.85);
    height: 28px;
    padding: 0 12px;
    border-radius: 4px;
    font-size: 13px;
    color: #cccccc;
    gap: 14px;
  }

  .shots-strip span {
    font-weight: 700;
    color: #ffffff;
  }

  /* ── STATUS MONITOR ────────────────────────────────────────────────── */
  #status {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    background: rgba(0,0,0,0.8);
    padding: 4px 8px;
    border-radius: 4px;
  }

  /* Hidden sandboxed browser engine container */
  #data-bridge {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 1px;
    height: 1px;
    opacity: 0;
    border: none;
  }
</style>
</head>
<body>

<div id="numeric-scoreboard">
  <div class="score-row">
    <div class="score-box" id="home-score">—</div>
    <div class="score-divider">VS</div>
    <div class="score-box" id="away-score">—</div>
  </div>

  <div class="shots-strip">
    <div>SOG: <span id="home-shots">—</span></div>
    <div style="color: #555;">|</div>
    <div>SOG: <span id="away-shots">—</span></div>
  </div>
</div>

<div id="status">Starting native frame engine...</div>

<iframe id="data-bridge" src="about:blank"></iframe>

<script>
const CONFIG = {
  gameUrl: 'https://gamesheetstats.com/seasons/15077/games/2901445',
  refreshSeconds: 15
};

const statusEl = document.getElementById('status');
const panelEl = document.getElementById('numeric-scoreboard');
const bridgeFrame = document.getElementById('data-bridge');

function log(msg) {
  statusEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
}

function extractNextJSData() {
  try {
    const frameDoc = bridgeFrame.contentDocument || bridgeFrame.contentWindow.document;
    if (!frameDoc) {
      log("Awaiting connection...");
      return;
    }

    let gameData = null;

    // Strategy 1: Target NextJS structural data tags directly
    const nextDataScript = frameDoc.getElementById('__NEXT_DATA__');
    if (nextDataScript) {
      const parsedRoot = JSON.parse(nextDataScript.textContent);
      // Dig deep into Next.js hydration page properties
      gameData = parsedRoot.props?.pageProps?.initialState?.game || parsedRoot.props?.pageProps?.game;
    }

    // Strategy 2: Text matching on raw scripts if metadata elements are stripped
    if (!gameData) {
      const scripts = Array.from(frameDoc.querySelectorAll('script'));
      for (let script of scripts) {
        const text = script.textContent;
        if (text.includes('homeGoals') || text.includes('homeScore')) {
          const matchHg = text.match(/"homeGoals"\s*:\s*([0-9]+)/);
          const matchAg = text.match(/"awayGoals"\s*:\s*([0-9]+)/);
          const matchHs = text.match(/"homeShots"\s*:\s*([0-9]+)/);
          const matchAs = text.match(/"awayShots"\s*:\s*([0-9]+)/);

          if (matchHg && matchAg) {
            gameData = {
              homeGoals: matchHg[1],
              awayGoals: matchAg[1],
              homeShots: matchHs ? matchHs[1] : "0",
              awayShots: matchAs ? matchAs[1] : "0"
            };
            break;
          }
        }
      }
    }

    // If we extracted a valid game state data object, apply it to the DOM elements
    if (gameData) {
      const hScore = gameData.homeGoals ?? gameData.homeScore ?? 0;
      const aScore = gameData.awayGoals ?? gameData.awayScore ?? 0;
      const hShots = gameData.homeShots ?? gameData.homeSog ?? 0;
      const aShots = gameData.awayShots ?? gameData.awaySog ?? 0;

      document.getElementById('home-score').textContent = hScore;
      document.getElementById('away-score').textContent = aScore;
      document.getElementById('home-shots').textContent = hShots;
      document.getElementById('away-shots').textContent = aShots;

      panelEl.classList.add('visible');
      log(`Sync Successful: ${hScore}-${aScore}`);
    } else {
      // Strategy 3: Visual fallback text matching directly off elements if Javascript parsing errors occur
      const rawText = frameDoc.body ? frameDoc.body.innerText : "";
      const scoreLayoutMatch = rawText.match(/(\d+)\s*-\s*(\d+)/);
      if (scoreLayoutMatch) {
        document.getElementById('home-score').textContent = scoreLayoutMatch[1];
        document.getElementById('away-score').textContent = scoreLayoutMatch[2];
        panelEl.classList.add('visible');
        log(`Synced via visual tracking fallback`);
      } else {
        log("Data layout engine pending page loading...");
      }
    }

  } catch (err) {
    log(`Frame restricted. Please check Step 2 below.`);
  }
}

function reloadTargetFrame() {
  log("Polling live website...");
  // Appending cache buster timestamp ensures OBS forces a fresh live download
  bridgeFrame.src = CONFIG.gameUrl + "?cachebuster=" + new Date().getTime();
}

// Automatically scan the iframe structure 3 seconds after it completes an HTTP load cycle
bridgeFrame.addEventListener('load', () => {
  setTimeout(extractNextJSData, 3000);
});

function init() {
  reloadTargetFrame();
  setInterval(reloadTargetFrame, CONFIG.refreshSeconds * 1000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

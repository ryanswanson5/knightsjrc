<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamesheet Stable Data Overlay</title>
<style>
  /* ── LAYOUT CONFIG ─────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Arial Narrow', Arial, sans-serif;
  }

  /* ── SCOREBOARD PANEL ──────────────────────────────────────────────── */
  #numeric-scoreboard {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #numeric-scoreboard.visible { opacity: 1; }

  .score-row {
    display: flex;
    align-items: center;
    background: #111111;
    height: 72px;
    border-radius: 4px;
    overflow: hidden;
  }

  .score-box {
    background: #e8c84a;
    height: 72px;
    width: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
    font-weight: 900;
    color: #111111;
  }

  .score-divider {
    color: #ffffff;
    font-size: 24px;
    font-weight: 700;
    padding: 0 20px;
    letter-spacing: 0.05em;
  }

  .shots-strip {
    display: flex;
    align-items: center;
    background: rgba(17, 17, 17, 0.85);
    height: 28px;
    padding: 0 12px;
    border-radius: 4px;
    font-size: 13px;
    color: #cccccc;
    gap: 14px;
  }

  .shots-strip span {
    font-weight: 700;
    color: #ffffff;
  }

  /* ── TELEMETRY STATUS MONITOR ──────────────────────────────────────── */
  #status {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    background: rgba(0,0,0,0.8);
    padding: 4px 8px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div id="numeric-scoreboard">
  <div class="score-row">
    <div class="score-box" id="home-score">—</div>
    <div class="score-divider">VS</div>
    <div class="score-box" id="away-score">—</div>
  </div>

  <div class="shots-strip">
    <div>SOG: <span id="home-shots">—</span></div>
    <div style="color: #555;">|</div>
    <div>SOG: <span id="away-shots">—</span></div>
  </div>
</div>

<div id="status">Sync Initializing...</div>

<script>
const CONFIG = {
  // Put ANY gamesheet match page URL here
  gameUrl: 'https://gamesheetstats.com/seasons/15077/games/2901445',
  refreshSeconds: 15
};

const statusEl = document.getElementById('status');
const panelEl = document.getElementById('numeric-scoreboard');

function log(msg) {
  statusEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
}

async function fetchTelemetryData() {
  try {
    // We use a completely different public proxy bridge that skips all browser security walls
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(CONFIG.gameUrl)}`;

    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error(`Server returned HTTP ${res.status}`);
    
    const htmlText = await res.text();
    if (!htmlText) throw new Error("Empty data layer");

    let hScore = "0", aScore = "0", hShots = "0", aShots = "0";

    // Fallback String Scan Strategy: Look inside the NextJS build configuration text strings
    const nextDataMatch = htmlText.match(/<script id="__NEXT_DATA__" type="application\/json">([\s\S]*?)<\/script>/);
    
    if (nextDataMatch) {
      const parsedJSON = JSON.parse(nextDataMatch[1]);
      const gameObj = parsedJSON.props?.pageProps?.initialState?.game || parsedJSON.props?.pageProps?.game;
      
      if (gameObj) {
        hScore = gameObj.homeGoals ?? gameObj.homeScore ?? "0";
        aScore = gameObj.awayGoals ?? gameObj.awayScore ?? "0";
        hShots = gameObj.homeShots ?? gameObj.homeSog ?? "0";
        aShots = gameObj.awayShots ?? gameObj.awaySog ?? "0";
      }
    }

    // Double Check System: If the JSON layout structural keys vary, use direct text boundaries
    if (hScore === "0" && aScore === "0") {
      const hScoreMatch = htmlText.match(/"homeGoals"\s*:\s*([0-9]+)/i) || htmlText.match(/"homeScore"\s*:\s*([0-9]+)/i);
      const aScoreMatch = htmlText.match(/"awayGoals"\s*:\s*([0-9]+)/i) || htmlText.match(/"awayScore"\s*:\s*([0-9]+)/i);
      const hShotsMatch = htmlText.match(/"homeShots"\s*:\s*([0-9]+)/i) || htmlText.match(/"homeSog"\s*:\s*([0-9]+)/i);
      const aShotsMatch = htmlText.match(/"awayShots"\s*:\s*([0-9]+)/i) || htmlText.match(/"awaySog"\s*:\s*([0-9]+)/i);

      if (hScoreMatch) hScore = hScoreMatch[1];
      if (aScoreMatch) aScore = aScoreMatch[1];
      if (hShotsMatch) hShots = hShotsMatch[1];
      if (aShotsMatch) aShots = aShotsMatch[1];
    }

    // Push properties to HTML
    document.getElementById('home-score').textContent = hScore;
    document.getElementById('away-score').textContent = aScore;
    document.getElementById('home-shots').textContent = hShots;
    document.getElementById('away-shots').textContent = aShots;

    panelEl.classList.add('visible');
    log(`Connected: ${hScore}-${aScore}`);

  } catch (err) {
    log(`Data Blocked: ${err.message}`);
  }
}

function init() {
  fetchTelemetryData();
  setInterval(fetchTelemetryData, CONFIG.refreshSeconds * 1000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamesheet Direct Live API Overlay</title>
<style>
  /* ── LAYOUT CONFIG ─────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Arial Narrow', Arial, sans-serif;
  }

  /* ── SCOREBOARD PANEL ──────────────────────────────────────────────── */
  #numeric-scoreboard {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #numeric-scoreboard.visible { opacity: 1; }

  .score-row {
    display: flex;
    align-items: center;
    background: #111111;
    height: 72px;
    border-radius: 4px;
    overflow: hidden;
  }

  .score-box {
    background: #e8c84a;
    height: 72px;
    width: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
    font-weight: 900;
    color: #111111;
  }

  .score-divider {
    color: #ffffff;
    font-size: 24px;
    font-weight: 700;
    padding: 0 20px;
    letter-spacing: 0.05em;
  }

  .shots-strip {
    display: flex;
    align-items: center;
    background: rgba(17, 17, 17, 0.85);
    height: 28px;
    padding: 0 12px;
    border-radius: 4px;
    font-size: 13px;
    color: #cccccc;
    gap: 14px;
  }

  .shots-strip span {
    font-weight: 700;
    color: #ffffff;
  }

  /* ── STATUS MONITOR ────────────────────────────────────────────────── */
  #status {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    background: rgba(0,0,0,0.8);
    padding: 4px 8px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div id="numeric-scoreboard">
  <div class="score-row">
    <div class="score-box" id="home-score">—</div>
    <div class="score-divider">VS</div>
    <div class="score-box" id="away-score">—</div>
  </div>

  <div class="shots-strip">
    <div>SOG: <span id="home-shots">—</span></div>
    <div style="color: #555;">|</div>
    <div>SOG: <span id="away-shots">—</span></div>
  </div>
</div>

<div id="status">Connecting directly to GameSheet Live Stream Data Engine...</div>

<script>
const CONFIG = {
  // Target Game ID 
  gameId: '2901445',
  refreshSeconds: 10
};

const statusEl = document.getElementById('status');
const panelEl = document.getElementById('numeric-scoreboard');

function log(msg) {
  statusEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
}

async function fetchTelemetryData() {
  try {
    // Connect directly to GameSheet's open public API endpoint for data hydration
    const apiUrl = `https://gamesheetstats.com/api/v1/games/${CONFIG.gameId}`;

    const res = await fetch(apiUrl);
    if (!res.ok) throw new Error(`API Status Error (${res.status})`);
    
    const rootData = await res.json();
    
    // Look up the nested telemetry properties safely from the JSON model
    const game = rootData?.game || rootData;
    
    if (!game) throw new Error("Unexpected API data block format");

    // Extracting scores and shots cleanly
    const hScore = game.homeGoals ?? game.homeScore ?? 0;
    const aScore = game.awayGoals ?? game.awayScore ?? 0;
    const hShots = game.homeShots ?? game.homeSog ?? 0;
    const aShots = game.awayShots ?? game.awaySog ?? 0;

    // Update overlay view properties
    document.getElementById('home-score').textContent = hScore;
    document.getElementById('away-score').textContent = aScore;
    document.getElementById('home-shots').textContent = hShots;
    document.getElementById('away-shots').textContent = aShots;

    panelEl.classList.add('visible');
    log(`Sync Successful: Score ${hScore}-${aScore} | Shots ${hShots}-${aShots}`);

  } catch (err) {
    log(`Sync Interrupted: ${err.message}`);
  }
}

function init() {
  fetchTelemetryData();
  // Runs a clean update every 10 seconds automatically
  setInterval(fetchTelemetryData, CONFIG.refreshSeconds * 1000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamesheet Direct Numbers Only Overlay</title>
<style>
  /* ── LAYOUT CONFIG ─────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Arial Narrow', Arial, sans-serif;
  }

  /* ── SCOREBOARD PANEL ──────────────────────────────────────────────── */
  #numeric-scoreboard {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #numeric-scoreboard.visible { opacity: 1; }

  .score-row {
    display: flex;
    align-items: center;
    background: #111111;
    height: 72px;
    border-radius: 4px;
    overflow: hidden;
  }

  .score-box {
    background: #e8c84a;
    height: 72px;
    width: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
    font-weight: 900;
    color: #111111;
  }

  .score-divider {
    color: #ffffff;
    font-size: 24px;
    font-weight: 700;
    padding: 0 20px;
    letter-spacing: 0.05em;
  }

  .shots-strip {
    display: flex;
    align-items: center;
    background: rgba(17, 17, 17, 0.85);
    height: 28px;
    padding: 0 12px;
    border-radius: 4px;
    font-size: 13px;
    color: #cccccc;
    gap: 14px;
  }

  .shots-strip span {
    font-weight: 700;
    color: #ffffff;
  }

  /* ── STATUS MONITOR ────────────────────────────────────────────────── */
  #status {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    background: rgba(0,0,0,0.8);
    padding: 4px 8px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div id="numeric-scoreboard">
  <div class="score-row">
    <div class="score-box" id="home-score">—</div>
    <div class="score-divider">VS</div>
    <div class="score-box" id="away-score">—</div>
  </div>

  <div class="shots-strip">
    <div>SOG: <span id="home-shots">—</span></div>
    <div style="color: #555;">|</div>
    <div>SOG: <span id="away-shots">—</span></div>
  </div>
</div>

<div id="status">Connecting proxy relay...</div>

<script>
const CONFIG = {
  // Target Gamesheet game page
  gameUrl: 'https://gamesheetstats.com/seasons/15077/games/2901445',
  refreshSeconds: 20
};

const statusEl = document.getElementById('status');
const panelEl = document.getElementById('numeric-scoreboard');

function log(msg) {
  statusEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
}

async function fetchTelemetryData() {
  try {
    // We use an allorigins proxy wrapper to completely handle CORS restriction 
    // and pull the exact raw, live production HTML text from the server.
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(CONFIG.gameUrl)}&_=` + new Date().getTime();

    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error(`Proxy network error (${res.status})`);
    
    const wrapper = await res.json();
    const dataStream = wrapper.contents;

    if (!dataStream) throw new Error("Empty dataset received from server.");

    // Direct lookups matching Gamesheet's data objects layout style:
    // e.g., "home":{"score":10,"shots":34...}
    const homeMatch = dataStream.match(/"home"\s*:\s*\{\s*"score"\s*:\s*([0-9]+)\s*,\s*"shots"\s*:\s*([0-9]+)/i);
    const awayMatch = dataStream.match(/"away"\s*:\s*\{\s*"score"\s*:\s*([0-9]+)\s*,\s*"shots"\s*:\s*([0-9]+)/i);

    let telemetry = { homeScore: "0", homeShots: "0", awayScore: "0", awayShots: "0" };

    if (homeMatch && awayMatch) {
      telemetry.homeScore = homeMatch[1];
      telemetry.homeShots = homeMatch[2];
      telemetry.awayScore = awayMatch[1];
      telemetry.awayShots = awayMatch[2];
    } else {
      // Secondary fallback scanner: scan looser key pairings if object order changes on live updates
      const hScore = dataStream.match(/"home"[\s\S]*?"score"\s*:\s*([0-9]+)/i);
      const aScore = dataStream.match(/"away"[\s\S]*?"score"\s*:\s*([0-9]+)/i);
      const hShots = dataStream.match(/"home"[\s\S]*?"shots"\s*:\s*([0-9]+)/i);
      const aShots = dataStream.match(/"away"[\s\S]*?"shots"\s*:\s*([0-9]+)/i);

      if (hScore) telemetry.homeScore = hScore[1];
      if (aScore) telemetry.awayScore = aScore[1];
      if (hShots) telemetry.homeShots = hShots[1];
      if (aShots) telemetry.awayShots = aShots[1];
    }

    // Push right to the OBS output view
    document.getElementById('home-score').textContent = telemetry.homeScore;
    document.getElementById('away-score').textContent = telemetry.awayScore;
    document.getElementById('home-shots').textContent = telemetry.homeShots;
    document.getElementById('away-shots').textContent = telemetry.awayShots;

    panelEl.classList.add('visible');
    log(`Update Active: Score ${telemetry.homeScore}-${telemetry.awayScore} | SOG ${telemetry.homeShots}-${telemetry.awayShots}`);

  } catch (err) {
    log(`Sync Error: ${err.message}`);
  }
}

function init() {
  fetchTelemetryData();
  setInterval(fetchTelemetryData, CONFIG.refreshSeconds * 1000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
